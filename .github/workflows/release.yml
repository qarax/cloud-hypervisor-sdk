name: Release

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version *= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.tag_check.outputs.exists == 'false'
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: cargo build

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ## cloud-hypervisor-sdk ${{ steps.version.outputs.tag }}

            ### Usage

            **Pin to this release:**
            ```toml
            cloud-hypervisor-sdk = { git = "https://github.com/${{ github.repository }}", tag = "${{ steps.version.outputs.tag }}" }
            ```

            **Always use latest main:**
            ```toml
            cloud-hypervisor-sdk = { git = "https://github.com/${{ github.repository }}", branch = "main" }
            ```
